<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مياه ابوسالم - قوارير 20 لتر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
    </style>
</head>
<body class="bg-gradient-to-b from-sky-100 to-white min-h-screen text-gray-800">
    <div class="max-w-3xl mx-auto px-6 py-16 text-center">
        <div class="bg-white rounded-3xl shadow-xl border border-sky-100 p-8 md:p-12">
            <div class="w-20 h-20 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428A4 4 0 0018 7.75h-1.26a8 8 0 10-15.32 3.163A4.5 4.5 0 005.5 19H18a4 4 0 001.428-3.572z"></path></svg>
            </div>
            <h1 class="text-4xl font-bold text-sky-900 mb-4 tracking-tight">مياه ابوسالم</h1>
            <p class="text-lg text-gray-600 mb-10">نوفر لكم قوارير مياه عالية الجودة مع خدمة سريعة وموثوقة داخل مدينة المفرق.</p>

            <div class="grid gap-4 text-right mb-10">
                <div class="bg-sky-50 border border-sky-100 rounded-2xl p-5">
                    <h2 class="text-xl font-semibold text-sky-800 mb-1">قوارير 20 لتر سعودي</h2>
                    <p class="text-gray-600">متوفرة للتوصيل الفوري داخل المدينة.</p>
                </div>
                <div class="bg-sky-50 border border-sky-100 rounded-2xl p-5">
                    <h2 class="text-xl font-semibold text-sky-800 mb-1">قوارير 20 لتر اردني</h2>
                    <p class="text-gray-600">جودة ممتازة وخدمة مريحة لطلباتكم اليومية.</p>
                </div>
            </div>

            <div class="bg-sky-600 text-white rounded-2xl p-6">
                <p class="text-xl font-bold mb-2">خدمة توصيل لجميع انحاء مدينة المفرق</p>
                <p class="text-sky-100">اطلب الآن واستمتع بسرعة التوصيل والراحة.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
